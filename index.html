<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Year Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-container">
        <h1>🐶 Dog Age Calculator</h1>
        <label for="ageInput">Enter your dog's age in human years:</label>
        <input type="number" id="ageInput" placeholder="e.g., 5" min="0" max="30">
        
        <button onclick="calculateAge()">Calculate</button>
        
        <div class="result-box">
            <p id="resultText">Your dog's age in dog years will appear here.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
